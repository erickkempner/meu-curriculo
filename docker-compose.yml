services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - APP_PORT=8080
      - APP_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=curriculo
      - DB_PASSWORD=curriculo123
      - DB_NAME=curriculo_db
      - DB_SSLMODE=disable
      - SESSION_SECRET=docker-dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: curriculo
      POSTGRES_PASSWORD: curriculo123
      POSTGRES_DB: curriculo_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curriculo -d curriculo_db"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
